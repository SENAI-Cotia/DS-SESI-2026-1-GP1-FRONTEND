<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyStock Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="logo.png" href="assets"
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
        <div class="logo">
          <img src="assets/logo.png" alt="EasyStock Logo">
           </div>
        <div class="login-card">
            <p class="welcome">
                Olá, seja bem-vindo(a) ao EasyStock! Para usar nossos serviços faça seu login!
            </p>

            <form id="loginForms">
                <div class="input-group">
        <label>Email</label>
        <div class="input-box">
             <input type="email" placeholder="exemplo@email.com">
               <span class="icon">👤</span>
           </div>
              </div>

                   <div class="input-group">
                      <label>Senha</label>
                            <div class="input-box">
                                <input type="password" id="password" placeholder="********">
                                <span class="icon" onclick="togglePassword()">👁️</span>
                            </div>
                        </div>
                        <button type="submit">ENTRAR</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
