<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/icons/icone-aba.svg" type="image/x-icon">
    <title>EasyStock</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="logo.png" href="assets">
    <script src="../js/login.js"></script>
</head>

<body class="body-login">

    <div class="container">
        <div class="logo-login">
            <img src="/assets/icons/logo.svg" alt="EasyStock Logo">
        </div>
        <div class="login-card">
            <p class="welcome">
                Olá, seja bem-vindo(a) ao EasyStock! Para usar nossos serviços faça seu Login!
            </p>

            <form id="loginForms">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-box">
                        <input type="email" placeholder="exemplo@email.com">
                        <span class="icon">

                            <img src="../assets/icons/IconMan.svg" alt="User">

                        </span>
                    </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <div class="input-box">
                            <input type="password" id="input-senha" placeholder="********">
                            <button type="button" arial-label="Mostrar senha" id="olho-senha" onclick="verSenha()"></button>

                        </div>
                        <button class="btn-entrar" type="submit"><a href="home.html">ENTRAR</a></button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
