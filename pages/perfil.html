<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Farro:wght@300;400;500;700&display=swap" rel="stylesheet">
    <title>EasyStock</title>
    <link rel="icon" href="/assets/icons/icone-aba.svg" type="image/x-icon">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="../css/navbar.css">
</head>

<body>


    <img src="../assets/images/fundo.png" class="fundo">

    <nav>
        <!-- Logo -->
        <img class="logo" src="/assets/icons/logo.svg" alt="Logo EasyStock">
        <!-- barra de opções -->


        <ul>
            <li>
                <img src="/assets/icons/dashboard-icone.svg" alt="dashboard">
                <a href="home.html">Dashboard</a>
            </li>
            <li>
                <img src="/assets/icons/produtos-icon.svg" alt="produtos">
                <a href="produtos.html">Produtos</a>
            </li>
            <li>
                <img src="/assets/icons/Estoque-icon.svg" alt="estoque">
                <a href="estoque.html">Estoque</a>
            </li>
            <li>
                <img src="/assets/icons/icone-relogio.svg" alt="">
                <a href="historico.html">Historico</a>
            </li>
        </ul>
    </nav>

    <div class="perfil">
        <img src="../assets/images/fotoPerfil.jpg" class="foto-perfil">

        <div class="msg-ola">
            <p>Olá administrador
            <p class="msg-nome">Ronaldo Luiz!</p>Seja Bem vindo!</p>
        </div>

        <div class="btn-personalizar-foto">
            <button class="btn-personalizar"><img src="../assets/icons/lapis-branco-icon.svg" alt=""></button>
        </div>
    </div>


    <div class="dados-container">
        <p class="dados-pessoais-title">Seus dados pessoais</p>

        <form action="" class="dados-pessoais">
            <fieldset class="fieldset">
                <h6 class="inputs-txt">Nome</h6>
                <input class="input" type="text" id="nome">

                <h6 class="inputs-txt">Email de cadastro</h6>
                <input class="input" type="email" id="email">
            </fieldset>

            <div class="divisao"></div>

            <fieldset class="fieldset">
                <h6 class="inputs-txt">Senha</h6>
                <input class="input-2" type="password" id="senha">
                <button><img src="/assets/icons/Eye.png" alt="olho-senha"></button>
            </fieldset>
        </form>

        <div class="btn-personalizar-dados">
            <button class="btn-personalizar-2"><img src="/assets/icons/lapis-branco-icon.svg" alt=""></button>
        </div>
    </div>


    <div class="gerentes-container">
        <p class="gerentes-title">Seus gerentes</p>
        <ul>
            <li>
                <div> <img src="../assets/images/fotoPerfil.jpg" alt="foto-gerente" class="foto-gerente">
                        Ana Previatto
                </div>
                <div>  
                    <img src="../assets/icons/lixo-icon.svg" alt="lixo-icon" class="icons-gerente-1">
                    <img src="../assets/icons/lapis-icon.svg" alt="lapis-icon" class="icons-gerente-2">
                </div> 
            </li>

            <li> 
                <div> <img src="../assets/images/fotoPerfil.jpg" alt="foto-gerente" class="foto-gerente">
                        Lavinia Bispo
                </div>
                <div> 
                    <img src="../assets/icons/lixo-icon.svg" alt="lixo-icon" class="icons-gerente-1">
                    <img src="../assets/icons/lapis-icon.svg" alt="lapis-icon" class="icons-gerente-2">
                </div>
            </li>

            <li> 
                <div>
                    <img src="../assets/images/fotoPerfil.jpg" alt="foto-gerente" class="foto-gerente">
                    Carolina A.
                </div>
                <div>
                    <img src="../assets/icons/lixo-icon.svg" alt="lixo-icon" class="icons-gerente-1">
                    <img src="../assets/icons/lapis-icon.svg" alt="lapis-icon" class="icons-gerente-2">
                </div> 

        </ul>
    </div>


    <div class="btn-container">
        <button class="btn-adicionar">
            <img src="../assets/icons/mais-icon.svg" alt="mais-icon" class="btn-icon-1">
            <p>Adicionar gerentes</p>
        </button>

        <button class="btn-sair">
            <img src="../assets/icons/sair-icon.svg" alt="" class="btn-icon-2">
            <p>Sair da conta</p>
        </button>
    </div>

<br><br><br><br>
</body>

</html>
